button:
  - platform: ld2410
    factory_reset:
      name: "LD2410 Factory reset sensor"
      id: ld2410_factory_reset
      disabled_by_default: true
      entity_category: config
      on_press:
        then:
        - logger.log: "Performing LD2410 Factory reset"
        - delay: 2s
        - switch.turn_on: ld2410_engineering_mode
      web_server:
        sorting_group_id: controls
        sorting_weight: 88
    restart:
      name: "LD2410 Reboot"
      id: ld2410_restart
      disabled_by_default: true
      entity_category: config
      web_server:
        sorting_group_id: controls
        sorting_weight: 70
    query_params:
      name: LD2410 Get values
      disabled_by_default: true
      entity_category: config

