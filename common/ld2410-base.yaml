        name: Gate 8 Still Sensitivity
        entity_category: config

button:
  - platform: ld2410
    factory_reset:
      name: "LD2410 Factory Reset"
      id: ld2410_factory_reset
      disabled_by_default: true
      entity_category: config
    restart:
      name: "LD2410 Restart"
      id: ld2410_restart
      disabled_by_default: true
      entity_category: config
    query_params:
      name: Get Values
      disabled_by_default: true
      entity_category: config

text_sensor:
  - platform: ld2410
    version:
      name: "LD2410 Firmware Version"
      entity_category: diagnostic
    mac_address:
      name: "LD2410 MAC Address"
      disabled_by_default: true
      entity_category: diagnostic

select:
