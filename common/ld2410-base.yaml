esphome:
  on_boot:
    then:
      - switch.turn_on: ld2410_engineering_mode

uart:
  - id: LD2410_uart
    baud_rate: 256000
    tx_pin: 1
    rx_pin: 2
    parity: NONE
    stop_bits: 1

ld2410:
  uart_id: LD2410_uart

binary_sensor:
  - platform: ld2410
    has_target:
      name: LD2410 Occupancy
      web_server:
        sorting_group_id: occupancy_group
        sorting_weight: 10
    has_moving_target:
      name: LD2410 Moving Target
      entity_category: diagnostic
    has_still_target:
      name: LD2410 Still Target
      entity_category: diagnostic
  - platform: gpio
    pin: 7
    name: LD2410 Occupancy GPIO
    device_class: Occupancy
    entity_category: diagnostic

sensor:
  - platform: ld2410
    light:
      name: LD2410 Illuminance
      device_class: illuminance
      entity_category: "" # I want to see that in the sensors and not in the diag where it is currently
#      disabled_by_default: false
      web_server:
        sorting_group_id: occupancy_group
        sorting_weight: 6
    moving_distance:
      name: LD2410 Moving Target Distance
      entity_category: diagnostic
    still_distance:
      name: LD2410 Still Target Distance
      entity_category: diagnostic
    moving_energy:
      name: LD2410 Moving Target Energy
      entity_category: diagnostic
    still_energy:
      name: LD2410 Still Target Energy
      entity_category: diagnostic
    detection_distance:
      name: LD2410 Detection Distance
      entity_category: diagnostic
    g0:
      move_energy:
        name: Gate 0 Movement Energy
        entity_category: diagnostic
        web_server:
          sorting_group_id: gates_2410
          sorting_weight: 100
      still_energy:
        name: Gate 0 Still Energy
