esphome:
  on_boot:
    then:
      - switch.turn_on: ld2410_engineering_mode

uart:
  id: LD2410_uart
  baud_rate:  256000
  rx_pin: 18
  tx_pin: 21
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: LD2410_uart

binary_sensor:
  - platform: ld2410
    has_target:
      name: LD2410 Occupancy
    has_moving_target:
      name: LD2410 Moving Target
      entity_category: diagnostic
    has_still_target:
      name: LD2410 Still Target
      entity_category: diagnostic
  - platform: gpio
    pin: 7
    name: LD2410 Occupancy GPIO
    device_class: Occupancy
    entity_category: diagnostic

sensor:
  - platform: ld2410
    light:
      name: LD2410 Illuminance
      disabled_by_default: true
      entity_category: diagnostic
    moving_distance:
      name: LD2410 Moving Target Distance
      entity_category: diagnostic
    still_distance:
      name: LD2410 Still Target Distance
      entity_category: diagnostic
    moving_energy:
      name: LD2410 Moving Target Energy
      entity_category: diagnostic
    still_energy:
      name: LD2410 Still Target Energy
      entity_category: diagnostic
    detection_distance:
      name: LD2410 Detection Distance
      entity_category: diagnostic
    g0:
      move_energy:
        name: Gate 0 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 0 Still Energy
        entity_category: diagnostic
    g1:
      move_energy:
        name: Gate 1 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 1 Still Energy
        entity_category: diagnostic
    g2:
      move_energy:
        name: Gate 2 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 2 Still Energy
        entity_category: diagnostic
    g3:
      move_energy:
        name: Gate 3 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 3 Still Energy
        entity_category: diagnostic
    g4:
      move_energy:
        name: Gate 4 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 4 Still Energy
        entity_category: diagnostic
    g5:
      move_energy:
        name: Gate 5 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 5 Still Energy
        entity_category: diagnostic
    g6:
      move_energy:
        name: Gate 6 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 6 Still Energy
        entity_category: diagnostic
    g7:
      move_energy:
        name: Gate 7 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 7 Still Energy
        entity_category: diagnostic
    g8:
      move_energy:
        name: Gate 8 Movement Energy
        entity_category: diagnostic
      still_energy:
        name: Gate 8 Still Energy
        entity_category: diagnostic

switch:
  - platform: ld2410
    engineering_mode:
      name: "LD2410 Engineering Mode"
      id: "ld2410_engineering_mode"
      entity_category: config
    bluetooth:
      name: "LD2410 Bluetooth"
      disabled_by_default: true
      entity_category: config

number:
  - platform: ld2410
    timeout:
      name: LD2410 Occupancy Off Delay
      entity_category: config
    light_threshold:
      name: LD2410 Light Threshold
      disabled_by_default: True
      entity_category: config
    max_move_distance_gate:
      name: LD2410 Max Movement Distance Gate
      entity_category: config
    max_still_distance_gate:
      name: LD2410 Max Still Distance Gate
      entity_category: config
    g0:
      move_threshold:
        name: Gate 0 Movement Sensitivity
        entity_category: config
        min_value: 0
        max_value: 100
        step: 1
        mode: box
      still_threshold:
        name: Gate 0 Still Sensitivity
        entity_category: config
        min_value: 0
        max_value: 100
        step: 1
        mode: box
    g1:
      move_threshold:
        name: Gate 1 Movement Sensitivity
        entity_category: config
      still_threshold:
        name: Gate 1 Still Sensitivity
        entity_category: config
    g2:
      move_threshold:
