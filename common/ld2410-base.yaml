esphome:
  on_boot:
    then:
      - switch.turn_on: ld2410_engineering_mode

uart:
  - id: LD2410_uart
    baud_rate: 256000
    tx_pin: 1
    rx_pin: 2
    parity: NONE
    stop_bits: 1

ld2410:
  uart_id: LD2410_uart

binary_sensor:
  - platform: ld2410
    has_target:
      name: LD2410 Occupancy
      web_server:
        sorting_group_id: occupancy_group
        sorting_weight: 10
    has_moving_target:
      name: LD2410 Moving target
      entity_category: diagnostic
    has_still_target:
      name: LD2410 Still target
      entity_category: diagnostic
  - platform: gpio
    pin: 7
    name: LD2410 Occupancy GPIO
    device_class: Occupancy
    entity_category: diagnostic

sensor:
