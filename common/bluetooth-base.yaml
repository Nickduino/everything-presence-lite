esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms # default 320ms. 
    window:   300ms # default 30ms. Bermuda BLE Trilateration recommends 300ms https://github.com/agittins/bermuda/wiki/ESPHome-Configurations#ble-tracker-settings

bluetooth_proxy:
  active: true

esp32_improv:
  authorizer: none
